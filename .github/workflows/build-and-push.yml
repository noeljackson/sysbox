name: Build and Push Sysbox

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-deploy
  SYSBOX_VERSION: "0.6.7"

jobs:
  build-binaries:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [amd64]
    env:
      VERSION: "0.6.7"
      EDITION: "Community Edition (CE)"
      TARGET_ARCH: amd64
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libseccomp-dev protobuf-compiler

      - name: Install protoc-gen-go
        run: go install github.com/golang/protobuf/protoc-gen-go@v1.5.2

      - name: Build sysbox-ipc
        run: |
          cd sysbox-ipc
          make sysbox-ipc

      - name: Build sysbox-runc (static)
        run: |
          cd sysbox-runc
          make BUILDTAGS="seccomp apparmor idmapped_mnt" static

      - name: Build sysbox-mgr
        run: |
          cd sysbox-mgr
          go mod tidy
          make

      - name: Build sysbox-fs
        run: |
          cd sysbox-fs
          go mod tidy
          make

      - name: Verify sysbox-runc features command
        run: |
          ./sysbox-runc/build/amd64/sysbox-runc --version
          ./sysbox-runc/build/amd64/sysbox-runc features | head -20

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts/bin/generic
          cp sysbox-runc/build/amd64/sysbox-runc artifacts/bin/generic/
          cp sysbox-mgr/build/amd64/sysbox-mgr artifacts/bin/generic/
          cp sysbox-fs/build/amd64/sysbox-fs artifacts/bin/generic/
          chmod +x artifacts/bin/generic/*

          # Copy k8s scripts
          mkdir -p artifacts/scripts
          cp sysbox-pkgr/k8s/scripts/sysbox-deploy-k8s.sh artifacts/scripts/
          cp sysbox-pkgr/k8s/scripts/sysbox-installer-helper.sh artifacts/scripts/
          cp sysbox-pkgr/k8s/scripts/sysbox-removal-helper.sh artifacts/scripts/
          # Containerd-specific deploy script (from main repo)
          cp scripts/sysbox-containerd-deploy.sh artifacts/scripts/
          chmod +x artifacts/scripts/*

          # Copy systemd files
          mkdir -p artifacts/systemd
          cp sysbox-pkgr/k8s/systemd/50-sysbox-mod.conf artifacts/systemd/
          cp sysbox-pkgr/k8s/systemd/99-sysbox-sysctl.conf artifacts/systemd/
          cp sysbox-pkgr/k8s/systemd/sysbox.service artifacts/systemd/
          cp sysbox-pkgr/k8s/systemd/sysbox-mgr.service artifacts/systemd/
          cp sysbox-pkgr/k8s/systemd/sysbox-fs.service artifacts/systemd/
          cp sysbox-pkgr/k8s/systemd/sysbox-installer-helper.service artifacts/systemd/
          cp sysbox-pkgr/k8s/systemd/sysbox-removal-helper.service artifacts/systemd/

          # Create version file
          echo "$(cat VERSION)-$(git rev-parse --short HEAD)" > artifacts/VERSION

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sysbox-binaries-${{ matrix.arch }}
          path: artifacts/

  build-and-push-image:
    needs: build-binaries
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: sysbox-binaries-amd64
          path: artifacts/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create Dockerfile
        run: |
          cat > Dockerfile.deploy <<'EOF'
          # Use CentOS 7 base for systemctl/dbus compatibility with host
          FROM centos:7

          ARG SYSBOX_VERSION=0.6.7
          ENV SYSBOX_VERSION=${SYSBOX_VERSION}

          # Fix CentOS 7 repos (EOL)
          RUN sed -i 's/mirrorlist/#mirrorlist/g' /etc/yum.repos.d/CentOS-* \
              && sed -i 's|#baseurl=http://mirror.centos.org|baseurl=http://vault.centos.org|g' /etc/yum.repos.d/CentOS-*

          # Install dependencies
          RUN yum install -y curl wget git bc which epel-release \
              && yum install -y jq \
              && yum clean all

          # Install kubectl
          RUN curl -Lso /bin/kubectl https://storage.googleapis.com/kubernetes-release/release/$(curl -s https://storage.googleapis.com/kubernetes-release/release/stable.txt)/bin/linux/amd64/kubectl \
              && chmod +x /bin/kubectl

          # Copy sysbox binaries (with features command for containerd)
          COPY artifacts/bin/generic/sysbox-runc /opt/sysbox/bin/generic/sysbox-runc
          COPY artifacts/bin/generic/sysbox-mgr /opt/sysbox/bin/generic/sysbox-mgr
          COPY artifacts/bin/generic/sysbox-fs /opt/sysbox/bin/generic/sysbox-fs
          RUN chmod +x /opt/sysbox/bin/generic/*

          # Copy k8s deployment scripts
          COPY artifacts/scripts/sysbox-deploy-k8s.sh /opt/sysbox/scripts/sysbox-deploy-k8s.sh
          COPY artifacts/scripts/sysbox-installer-helper.sh /opt/sysbox/scripts/sysbox-installer-helper.sh
          COPY artifacts/scripts/sysbox-removal-helper.sh /opt/sysbox/scripts/sysbox-removal-helper.sh
          COPY artifacts/scripts/sysbox-containerd-deploy.sh /opt/sysbox/scripts/sysbox-containerd-deploy.sh
          RUN chmod +x /opt/sysbox/scripts/*

          # Copy systemd unit files and configs
          COPY artifacts/systemd/50-sysbox-mod.conf /opt/sysbox/systemd/50-sysbox-mod.conf
          COPY artifacts/systemd/99-sysbox-sysctl.conf /opt/sysbox/systemd/99-sysbox-sysctl.conf
          COPY artifacts/systemd/sysbox.service /opt/sysbox/systemd/sysbox.service
          COPY artifacts/systemd/sysbox-mgr.service /opt/sysbox/systemd/sysbox-mgr.service
          COPY artifacts/systemd/sysbox-fs.service /opt/sysbox/systemd/sysbox-fs.service
          COPY artifacts/systemd/sysbox-installer-helper.service /opt/sysbox/systemd/sysbox-installer-helper.service
          COPY artifacts/systemd/sysbox-removal-helper.service /opt/sysbox/systemd/sysbox-removal-helper.service

          WORKDIR /opt/sysbox

          # Default command runs the deploy script
          CMD ["bash", "-c", "/opt/sysbox/scripts/sysbox-deploy-k8s.sh ce install"]
          EOF

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.deploy
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-binaries:
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: sysbox-binaries-amd64
          path: artifacts/

      - name: Create tarball
        run: |
          cd artifacts
          tar -czvf sysbox-linux-amd64.tar.gz bin/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/sysbox-linux-amd64.tar.gz
          generate_release_notes: true
