---
# Sysbox installation for containerd (RKE2/K3s)
# Uses pre-built binaries from ghcr.io/noeljackson/sysbox-deploy
# This manifest deploys sysbox WITHOUT switching to CRI-O
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sysbox-deploy
  namespace: kube-system
---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: sysbox-deploy
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete", "watch"]
---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: sysbox-deploy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sysbox-deploy
subjects:
- kind: ServiceAccount
  name: sysbox-deploy
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sysbox-deploy-containerd
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: sysbox-deploy-containerd
  template:
    metadata:
      labels:
        app: sysbox-deploy-containerd
    spec:
      serviceAccountName: sysbox-deploy
      nodeSelector:
        sysbox-install: "yes"
      tolerations:
      - key: "sysbox-runtime"
        operator: "Equal"
        value: "not-running"
        effect: "NoSchedule"
      - operator: "Exists"
        effect: "NoSchedule"
      hostNetwork: true
      hostPID: true
      containers:
      - name: sysbox-deploy
        image: ghcr.io/noeljackson/sysbox-deploy:latest
        imagePullPolicy: Always
        command: ["bash", "-c", "/opt/sysbox/scripts/sysbox-containerd-deploy.sh install"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: SYSBOX_VERSION
          value: "0.6.7"
        securityContext:
          privileged: true
        volumeMounts:
        - name: host-etc
          mountPath: /mnt/host/etc
        - name: host-osrelease
          mountPath: /mnt/host/os-release
        - name: host-dbus
          mountPath: /var/run/dbus
        - name: host-run-systemd
          mountPath: /run/systemd
        - name: host-lib-systemd
          mountPath: /mnt/host/lib/systemd/system
        - name: host-etc-systemd
          mountPath: /mnt/host/etc/systemd/system
        - name: host-lib-sysctl
          mountPath: /mnt/host/lib/sysctl.d
        - name: host-usr-bin
          mountPath: /mnt/host/usr/bin
        - name: host-usr-local-bin
          mountPath: /mnt/host/usr/local/bin
        - name: host-usr-lib-mod-load
          mountPath: /mnt/host/usr/lib/modules-load.d
        - name: host-run
          mountPath: /mnt/host/run
        - name: host-var-lib
          mountPath: /mnt/host/var/lib
      volumes:
      - name: host-etc
        hostPath:
          path: /etc
      - name: host-osrelease
        hostPath:
          path: /etc/os-release
      - name: host-dbus
        hostPath:
          path: /var/run/dbus
      - name: host-run-systemd
        hostPath:
          path: /run/systemd
      - name: host-lib-systemd
        hostPath:
          path: /lib/systemd/system
      - name: host-etc-systemd
        hostPath:
          path: /etc/systemd/system
      - name: host-lib-sysctl
        hostPath:
          path: /lib/sysctl.d
      - name: host-usr-bin
        hostPath:
          path: /usr/bin
      - name: host-usr-local-bin
        hostPath:
          path: /usr/local/bin
      - name: host-usr-lib-mod-load
        hostPath:
          path: /usr/lib/modules-load.d
      - name: host-run
        hostPath:
          path: /run
      - name: host-var-lib
        hostPath:
          path: /var/lib
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
---
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: sysbox-runc
handler: sysbox-runc
scheduling:
  nodeSelector:
    sysbox-runtime: running
